<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grid system — TransportNY Design System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="_shared.css"/>
<script>
tailwind.config = { theme: { extend: { fontFamily: {
  oswald: ['Oswald','Bebas Neue','sans-serif'],
  proxima: ['Proxima Nova','Source Sans 3','system-ui','sans-serif'],
  mono: ['ui-monospace','SFMono-Regular','Menlo','monospace'],
}}}};
</script>
<style>
@font-face { font-family:'Oswald'; src:url('../fonts/Oswald-Variable.woff2') format('woff2-variations'); font-weight:300 700; font-display:swap; }
@font-face { font-family:'Proxima Nova'; src:url('../fonts/SourceSans3-Variable.woff2') format('woff2-variations'); font-weight:300 700; font-display:swap; }
body { font-family:'Proxima Nova', system-ui, sans-serif; background:#f1f3f6; color:#0f1722; }
.font-oswald { font-family:'Oswald','Bebas Neue',sans-serif; }
.font-proxima { font-family:'Proxima Nova','Source Sans 3',system-ui,sans-serif; }
.font-mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }

.tny-active-bar { border-left: 3px solid #FACC15; }
.tny-press { border-bottom-width:4px; transition:all .08s; }
.tny-press:active { border-bottom-width:2px; margin-bottom:2px; }

@keyframes pulse-dot { 0%,100%{ opacity:1; transform:scale(1) } 50%{ opacity:.45; transform:scale(1.25) } }
.dot-pulse { animation: pulse-dot 2.4s ease-in-out infinite; transform-origin:center; }

/* ── Diagram surface — a faint dot grid, like graph paper ────── */
.diagram {
  background:
    radial-gradient(circle, rgba(15,23,42,0.10) 1px, transparent 1.5px),
    #fbfbfc;
  background-size: 8px 8px;
  background-position: 0 0;
}
.diagram-light {
  background:
    radial-gradient(circle, rgba(15,23,42,0.05) 1px, transparent 1.5px),
    #fff;
  background-size: 8px 8px;
}

/* ── Container outline & fill tokens ──── */
.box-fill   { background: rgba(55,87,107,0.10); border: 1px solid rgba(55,87,107,0.45); }
.box-fill-2 { background: rgba(202,138,4,0.12); border: 1px solid rgba(202,138,4,0.55); }
.box-fill-3 { background: rgba(15,23,42,0.05);  border: 1px solid rgba(15,23,42,0.30); }

/* ── Gutter pattern — 8 stripes diagonally hatched ──── */
.hatch {
  background-image: repeating-linear-gradient(45deg,
    rgba(250,204,21,0.30) 0 3px, transparent 3px 8px);
  border-left: 1px dashed rgba(202,138,4,0.6);
  border-right: 1px dashed rgba(202,138,4,0.6);
}

/* ── Annotation tag ──── */
.tag-anno {
  font-family: ui-monospace, monospace;
  font-size: 9.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 1px 5px;
  background: #FACC15;
  color: #0a0e13;
  border-radius: 2px;
  white-space: nowrap;
}
.tag-anno-dark {
  background: #0a0e13; color: #FACC15;
}

/* ruler tick */
.ruler { position: relative; height: 16px; }
.ruler::before { content: ''; position: absolute; left: 0; right: 0; top: 7px; height: 1px; background: rgba(15,23,42,0.4); }
.ruler::after { content: ''; position: absolute; top: 3px; height: 9px; width: 1px; background: rgba(15,23,42,0.6); }
.ruler-l::after { left: 0; }
.ruler-r::after { left: 100%; transform: translateX(-1px); }

::selection { background:#FACC15; color:#0a0e13; }

/* small-caps kicker */
.kicker { font-family:'Oswald', sans-serif; font-size:10.5px; text-transform:uppercase; letter-spacing:0.18em; color:#64748b; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="_chrome.jsx"></script>
<script type="text/babel" src="grid-system.jsx?v=6"></script>
</head>

</body>
</html>
