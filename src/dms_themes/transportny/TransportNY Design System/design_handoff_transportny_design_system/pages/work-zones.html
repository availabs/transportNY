<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Work Zones — TransportNY</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="_shared.css"/>
<style>
@font-face { font-family:'Oswald'; src:url('../fonts/Oswald-Variable.woff2') format('woff2-variations'); font-weight:300 700; font-display:swap; }
@font-face { font-family:'Proxima Nova'; src:url('../fonts/SourceSans3-Variable.woff2') format('woff2-variations'); font-weight:300 700; font-display:swap; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="_icons.jsx"></script>
<script type="text/babel" src="_chrome.jsx"></script>
</head>
<body class="tny-pane">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const Icon = window.TNYIcon;

function KPI({ dot, label, total='1,265', perDay='40.8/day', deltaDir='down', delta='0.8', perDayNum='41.1/day' }) {
  const up = deltaDir==='up';
  return (
    <div className="px-4 py-3">
      <div className="flex items-center gap-2 mb-1">
        {dot==='radio'
          ? <span className="size-3 rounded-full border-2 border-slate-400"/>
          : <span className="size-2.5 rounded-full" style={{background:dot}}/>}
        <span className="text-[12.5px] text-slate-600">{label}</span>
      </div>
      <div className="flex items-end justify-between">
        <div>
          <div className="font-oswald font-semibold text-[22px] text-slate-900 leading-none tabular-nums">{total}</div>
          <div className="text-[10.5px] font-mono text-slate-500 mt-1">{perDay}</div>
        </div>
        <div className="text-right">
          <div className={`text-[14px] font-oswald font-semibold tabular-nums ${up?'text-red-600':'text-emerald-600'}`}>
            {up? '↑':'↓'} {delta}%
          </div>
          <div className="text-[10.5px] font-mono text-slate-500 mt-1">{perDayNum}</div>
        </div>
      </div>
    </div>
  );
}

function CardShell({ title, sub, children, className='' }) {
  return (
    <div className={`rounded border border-zinc-950/10 bg-white shadow-sm overflow-hidden ${className}`}>
      <div className="px-4 pt-3 pb-2 border-b border-zinc-950/5">
        <div className="font-oswald font-medium text-[14px] text-slate-800 leading-snug">{title}</div>
        {sub && <div className="text-[11px] text-slate-500">{sub}</div>}
      </div>
      <div>{children}</div>
    </div>
  );
}

/* Day-of-month bar chart */
function DayBars() {
  const days = Array.from({length:31}, (_,i)=>i+1);
  // pseudo-random heights
  const vals = [22,16,12,8, 28,32,18,15, 24,28,22,18, 30,42,38,46, 30,44,48,52, 30,48,54,42, 50,44,40,46, 50,48,56];
  const max = 60, W=720, H=200, gL=28, gR=10, gB=34, gT=10;
  const innerW = W-gL-gR, innerH = H-gT-gB;
  const slot = innerW / days.length, bw = slot*0.62;
  const y = v => gT + innerH - (v/max)*innerH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
      {[0,10,20,30,40,50,60].map((v,i)=>{
        const yy = y(v);
        return (<g key={i}>
          <line x1={gL} y1={yy} x2={W-gR} y2={yy} stroke="rgba(15,23,42,0.06)"/>
          <text x={gL-4} y={yy+3} fontSize="9" fontFamily="ui-monospace,monospace" textAnchor="end" fill="#94a3b8">{v}</text>
        </g>);
      })}
      {days.map((d,i)=>{
        const cx = gL + slot*i + slot/2;
        return (<g key={d}>
          <rect x={cx-bw/2} y={y(vals[i])} width={bw} height={H-gB-y(vals[i])} fill="#F3CB6B"/>
          <text x={cx} y={H-18} fontSize="9" fontFamily="ui-monospace,monospace" textAnchor="middle" fill="#64748b">{d}</text>
        </g>);
      })}
      <text x={W/2} y={H-3} fontSize="10" fontFamily="ui-monospace,monospace" textAnchor="middle" fill="#475569">Day of Month</text>
    </svg>
  );
}

function App() {
  return (
    <div className="min-h-screen">
      <TNYSidebar product="NPMRDS" active="macro" expanded={false} nav={[
        { id:'search', label:'Search', icon:'Search' },
        { id:'tile', label:'Tiles', icon:'MapLayers' },
        { id:'pin', label:'Pins', icon:'MapPin' },
        { id:'macro', label:'Macro', icon:'Activity' },
      ]}/>
      <main className="ml-16">
        <div data-screen-label="01 Hero" className="tny-bluebar px-10 pt-5 pb-7 text-white">
          <div className="text-[12px] text-white/70 mb-1">Type</div>
          <div className="flex items-center gap-3">
            <h1 className="font-oswald font-semibold text-[44px] leading-none">Work Zones</h1>
            <Icon name="CaretDown" className="size-7 text-white/80"/>
          </div>
        </div>
        <TNYFilterBar items={[
          { label:'Region', value:'Region 3 - Central New York' },
          { label:'Month', value:"October '25" },
          { label:'Road Class', value:'All' },
        ]}/>

        <div className="px-10 py-6 space-y-5">
          <div className="grid grid-cols-[1fr_1fr_1.6fr] gap-4">
            <CardShell title="Reported Workzones" sub="vs previous month/day">
              <KPI dot="radio" label="Total"/>
              <KPI dot="#F3CB6B" label="Construction" deltaDir="up" delta="2"/>
            </CardShell>
            <CardShell title="Total Workzone Delay Cost" sub="vs previous month/day">
              <KPI dot="radio" label="Total"/>
              <KPI dot="#F3CB6B" label="Construction" deltaDir="up" delta="2"/>
            </CardShell>
            <CardShell title="Workzones" sub="Type by Day">
              <div className="p-3"><DayBars/></div>
            </CardShell>
          </div>

          <div className="rounded border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
            <div className="px-4 py-3 border-b border-zinc-950/5">
              <div className="font-oswald font-medium text-[14px] text-slate-800">Top 20 Workzones by Delay Cost</div>
              <div className="text-[11px] text-slate-500 font-mono">2025-10</div>
            </div>
            <div className="grid grid-cols-[1fr_1fr]">
              <div>
                <table className="w-full tbl">
                  <thead>
                    <tr className="bg-slate-50">
                      {[['EVENT','desc'],['FACILITY'],['COST'],['DURATION']].map(([h,o])=>(
                        <th key={h} className="font-oswald uppercase text-[10.5px] tracking-[0.1em] text-slate-700 px-3 py-2 text-left">
                          <span className="inline-flex items-center gap-1.5">{h}<Icon name={o==='desc'?'SortDesc':'SortAsc'} className="size-3 text-slate-500"/></span>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Array.from({length:11}).map((_,i)=>(
                      <tr key={i}>
                        <td className="px-3 py-2.5">
                          <div className="text-[13px] text-slate-700">Construction</div>
                          <div className="text-[10.5px] font-mono text-slate-500">2025-10-15</div>
                        </td>
                        <td className="px-3 py-2.5">
                          <div className="text-[13px] text-slate-700">I-81</div>
                          <div className="text-[10.5px] font-mono text-slate-500">11:00:10</div>
                        </td>
                        <td className="px-3 py-2.5 text-[13px] text-slate-700">$0.00</td>
                        <td className="px-3 py-2.5 text-[13px] text-slate-700">7h 0m</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="relative tny-map border-l border-zinc-950/10 min-h-[480px]">
                <button className="absolute top-2 left-2 w-7 h-7 rounded bg-white shadow border border-zinc-950/10 flex items-center justify-center"><Icon name="ChevronLeft" className="size-3.5 text-slate-600 rotate-180"/></button>
                <div className="absolute top-12 left-44 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Royston</div>
                <div className="absolute top-32 left-24 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Minetto</div>
                <div className="absolute top-44 left-48 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Fulton</div>
                <div className="absolute top-1/2 left-1/2 text-[12px] font-oswald uppercase tracking-wider text-slate-700">Syracuse</div>
                <div className="absolute bottom-24 left-32 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Van Buren</div>
                <div className="absolute bottom-16 right-24 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Sullivan</div>
                <div className="absolute bottom-32 right-32 text-[11px] font-oswald uppercase tracking-wider text-slate-700">Marcellus</div>
                <div className="absolute top-36 left-32 text-[10px] font-mono text-slate-500">OSWEGO</div>
                <div className="absolute top-10 right-16 px-1.5 py-0.5 bg-white border border-slate-400 rounded-sm text-[9px] font-mono">104</div>
                <div className="absolute top-1/2 right-8 px-2 py-0.5 bg-amber-500 rounded-sm text-[10px] text-white font-bold">81</div>
                <div className="absolute bottom-10 right-12 px-2 py-0.5 bg-amber-500 rounded-sm text-[10px] text-white font-bold">90</div>
                {[[260,210],[280,225],[290,250],[300,260],[320,278],[260,300],[245,310],[270,330],[300,310],[260,340],[290,360]].map(([x,y],i)=>(
                  <span key={i} className="absolute size-3 rounded-full bg-yellow-400 border border-yellow-700/40 shadow" style={{left:x, top:y}}/>
                ))}
              </div>
            </div>
          </div>
        </div>
        <TNYFooter/>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
